name: Lint React + Vite

on:
  push:
    branches:
      - feature/lint

  pull_request:
    branches:
      - develop

jobs:
  lint:
    name: Revisar calidad del código
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar ESLint
        run: npm run lint

      - name: Lint completado
        run: echo "El código cumple con las reglas de ESLint."